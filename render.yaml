services:
  - type: web
    name: bao-cao-ho-tro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_DEBUG
        value: "0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        sync: false
